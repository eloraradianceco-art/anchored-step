  48: [{ref:'2 Corinthians 4:16',author:'Paul',location:'Written from Macedonia, c. AD 55–56',audience:'The church at Corinth',commentary:'Paul describes a paradox of Christian experience: the outer self is wasting away (phtharō — decaying, perishing) while the inner self is being renewed (anakainoō — made qualitatively new). The outer-inner distinction is not Platonic dualism but a practical observation: physical deterioration does not touch the deepest reality of who the believer is becoming. Day by day, invisibly, the Spirit is accomplishing a transformation that reverses every outward decline.'}, {ref:'Titus 3:5',author:'Paul',location:'Written from Macedonia or Rome, c. AD 62–65',audience:'Titus, leading the churches on Crete',commentary:'Paul describes salvation in terms of regeneration (palingenesia — rebirth) and renewing (anakainōsis). These are not human achievements but the work of the Holy Spirit — \'whom he poured out on us richly.\' The washing of regeneration is a once-for-all new birth; the renewing of the Holy Spirit is an ongoing process. The Christian life is initiated by dramatic new creation and sustained by continuous renewal.'}, {ref:'Lamentations 3:22–23',author:'Jeremiah',location:'Jerusalem, written amid devastating loss',audience:'The traumatized survivors of Jerusalem\'s fall',commentary:'In the ruins of everything, Jeremiah reaches for the one stable reality: God\'s hesed and rahamim are new every morning. The Hebrew chadash (new) means not merely repeated but genuinely fresh — like each morning\'s light, not yesterday\'s warmth recycled. Renewal is built into the rhythm of God\'s faithfulness; every morning is a new dispensation of His loyalty. The depth of loss cannot outpace the freshness of His mercies.'}],
  49: [{ref:'1 Thessalonians 4:16–17',author:'Paul',location:'Written from Corinth, c. AD 51',audience:'The young church at Thessalonica, anxious about believers who had died before Christ\'s return',commentary:'Paul describes the return of Christ with commanding imagery: a shout (keleusmati — a military command), the archangel\'s voice, the trumpet of God. The dead in Christ rise first — Paul addresses a specific pastoral concern that those who have died have missed out. The phrase \'caught up together\' (harpazō — seized, snatched) gives us the theological concept of the rapture. \'And so we will always be with the Lord\' is the summary: presence, not merely rescue.'}, {ref:'Matthew 24:44',author:'Matthew (Levi)',location:'Antioch or Palestine, c. AD 80–90',audience:'Jewish Christian community',commentary:'Jesus\' instruction to \'be ready\' is grounded in the unknowability of the timing — \'at an hour you do not expect.\' Readiness is not passive waiting or fearful watching but faithful living. The preceding parable of the wise and foolish servants (vv. 45–51) defines readiness concretely: doing what the Master assigned when He returns, not abandoning it because He has delayed.'}, {ref:'Revelation 22:20',author:'John the Apostle',location:'Written from Patmos during the reign of Domitian, c. AD 95',audience:'Seven churches in Asia Minor under Roman persecution',commentary:'\'Come, Lord Jesus\' — the final prayer of Scripture. The Greek erchou (come) is an imperative — a plea, a summons, an expression of longing. The Aramaic form of this prayer, Maranatha (1 Corinthians 16:22), was used in early Christian worship as a confession and a longing. The last word of the Bible is not a doctrine but a relationship: the longing of a people for the return of the One they love.'}],
  50: [{ref:'John 15:4–5',author:'John the Apostle',location:'Ephesus, c. AD 90–95',audience:'Believers across Asia Minor',commentary:'Jesus teaches the vine-and-branches metaphor on the night before His crucifixion, walking through Gethsemane where vines lined the path. The word menō (abide, remain) appears ten times in John 15. It describes not an intense spiritual experience but a sustained, ordinary, continuous remaining — like a branch that stays attached to the vine not by dramatic effort but by simply not detaching. The fruit produced is not manufactured; it is the natural result of uninterrupted connection.'}, {ref:'Colossians 2:6–7',author:'Paul',location:'Rome, c. AD 60–62',audience:'The church at Colossae, threatened by philosophical syncretism',commentary:'Paul uses four participles to describe the abiding life: rooted (ērizōmenoi — like a tree with deep roots), built up (epoikodomoumenoi — like a building rising course by course), strengthened in faith, and overflowing with thanksgiving. The roots metaphor is passive (established by another); the building metaphor is active (rising upward). Both are sustained by the faith \'as you were taught\' — the apostolic deposit maintained against novelty.'}, {ref:'1 John 2:28',author:'John the Apostle',location:'Ephesus, late 1st century',audience:'Churches facing early Gnostic teaching',commentary:'John gives the eschatological motivation for abiding: confidence (parrēsia — bold, unashamed openness) at Christ\'s appearing. The alternative — being \'ashamed before him at his coming\' — describes a person whose life did not match their confession. Abiding is not mystical withdrawal but the consistent, daily alignment of life with the character of Christ, so that His return finds us in the posture we have been practicing.'}],
  51: [{ref:'2 Timothy 4:7',author:'Paul',location:'Rome, written from death row, c. AD 67',audience:'Timothy, his son in the faith',commentary:'Paul writes these words days or weeks before his execution. The three perfect tenses are declarations of completed action: I have fought, I have finished, I have kept. The athletic images — the good fight (agōn — a contest requiring full effort) and the race — describe not a victory over external enemies but faithfulness in the task assigned. Finishing well is not finishing first; it is arriving at the end with your faith intact.'}, {ref:'Philippians 3:13–14',author:'Paul',location:'Rome, c. AD 61',audience:'The beloved church at Philippi',commentary:'Paul\'s \'one thing\' (hen de) cuts through the complexity of spiritual life to its singular discipline: forgetting what is behind, reaching for what is ahead. The Greek epekteinomai (straining forward) describes an athlete lunging across the finish line — everything forward-oriented. The backward-looking that must be forgotten includes both failures (that would produce shame) and successes (that would produce complacency). Both can stop the race.'}, {ref:'Hebrews 12:2',author:'Unknown',location:'Written before AD 70',audience:'Jewish believers tempted to abandon faith',commentary:'Jesus is the \'author and finisher\' (archēgos kai teleiōtēs) of faith — He both originates and completes it. Looking to Jesus is the discipline: fixing one\'s gaze on the one who endured the cross \'for the joy set before him.\' The joy was not despite the suffering but through it — the anticipation of what the suffering would accomplish. Finishing well requires keeping that same eternal perspective in view.'}],
  52: [{ref:'Deuteronomy 8:2',author:'Moses',location:'The plains of Moab, at the threshold of the Promised Land',audience:'The second generation of Israel, who would enter Canaan',commentary:'Moses instructs Israel to \'remember\' the wilderness years — not to dwell in regret or nostalgia, but to recognize God\'s faithfulness threaded through their failures and difficulties. The purpose of the wilderness was pedagogical: to humble, to test, to reveal what was in their hearts. Remembering reframes every hardship as purposeful formation rather than random suffering or divine abandonment.'}, {ref:'1 Samuel 7:12',author:'Samuel and later editors',location:'Mizpah, after a decisive victory over the Philistines',audience:'The nation of Israel',commentary:'Samuel sets up a stone and names it Ebenezer — \'stone of help\' — declaring \'Thus far the Lord has helped us.\' The stone is a physical, tangible act of remembrance: a marker in the landscape that says \'God was here.\' Annual reflection serves the same purpose: setting markers in the story of one\'s life where God\'s faithfulness is documented and declared, so that future hardship is faced with the evidence of past faithfulness.'}, {ref:'Revelation 21:5',author:'John the Apostle',location:'Written from Patmos, c. AD 95',audience:'Seven persecuted churches in Asia Minor',commentary:'The One seated on the throne speaks for the first time in Revelation: \'Behold, I am making all things new.\' The Greek kainos (new) means qualitatively new — not merely renovated but of a new order entirely. Reflection at the end of a year is not just backward-looking; it is practiced by one who knows the trajectory of history. The One who makes all things new is the same One who has been faithfully at work in the year just completed.'}]
};

function todayStr() { return new Date().toISOString().split("T")[0]; }
function calcStreak(data) {
  const entries = Object.keys(data).filter(k=>k.startsWith("day_")).sort().reverse();
  if (!entries.length) return 0;
  let streak=0, cursor=new Date(); cursor.setHours(0,0,0,0);
  for (let i=0;i<entries.length;i++) {
    const d=new Date(entries[i].replace("day_","")); d.setHours(0,0,0,0);
    const diff=Math.round((cursor-d)/86400000);
    if (diff===0||diff===1){streak++;cursor=d;}else break;
  }
  return streak;
}
function markToday(data) {
  const key="day_"+todayStr();
  if (!data[key]){const u={...data,[key]:true};persist(u);return u;}
  return data;
}

              const done=daysComplete(w.week),cur=w.week===wk,pct=done/7;
              const bg=cur?G.gold:pct===1?G.green:pct>0?"rgba(120,184,120,"+(0.25+pct*0.55)+")":"rgba(255,255,255,0.045)";
              return button({key:w.week,onClick:()=>{goWk(w.week);setView("journal");},title:"Week "+w.week+": "+w.title,style:{width:25,height:25,borderRadius:5,background:bg,border:"1px solid "+(cur?G.gold:"transparent"),cursor:"pointer",fontSize:9,color:pct>0||cur?"#fff":G.dim,transition:"all .15s",display:"flex",alignItems:"center",justifyContent:"center"}},w.week)
            })
          )
        )
      ),

      // EXPORT
      view==="export"&&div({className:"fi"},
        div({style:{marginBottom:22}},
          h2({style:{fontFamily:"Cinzel,serif",fontSize:20,color:G.cream,marginBottom:3}},"Export Your Journal"),
          p({style:{fontSize:13,color:G.muted,fontStyle:"italic",lineHeight:1.6}},"Download everything you have written this year as a text file.")
        ),
        div({style:{background:G.bgCard,border:"1px solid "+G.border,borderRadius:12,padding:"24px",textAlign:"center"}},
          div({style:{fontSize:32,marginBottom:12}},"📄"),
          div({style:{fontFamily:"Cinzel,serif",fontSize:15,color:G.cream,marginBottom:8}},"Your Complete Faith Journal"),
          p({style:{fontSize:13,color:G.muted,lineHeight:1.7,marginBottom:20}},"Includes all study notes, reflections, prayers, and tracker entries from every week."),
          button({onClick:exportNotes,style:{background:"linear-gradient(135deg,rgba(180,140,60,0.25),rgba(180,140,60,0.1))",border:"1px solid "+G.goldBorder,color:G.gold,padding:"13px 32px",borderRadius:10,cursor:"pointer",fontSize:14,fontFamily:"Cinzel,serif",letterSpacing:"0.1em"}},"↓ Download Journal (.txt)")
        )
      )

    ) // end main
  ); // end return
} // end App

createRoot(document.getElementById("root")).render(h(App, null));
</script>
</body>
</html>
